name: Computer-use e2e

on:
  pull_request:
    paths:
      - '.github/workflows/computer-e2e.yml'
      - 'config/electron-builder.config.cjs'
      - 'config/scripts/build-computer-macos.mjs'
      - 'config/scripts/verify-computer-native.mjs'
      - 'native/computer-use-macos/**'
      - 'native/computer-use-linux/**'
      - 'native/computer-use-windows/**'
      - 'src/cli/**'
      - 'src/main/computer/**'
      - 'src/main/runtime/rpc/methods/computer.ts'
      - 'src/shared/runtime-types.ts'
      - 'tests/e2e/computer-linux.e2e.ts'
      - 'tests/e2e/computer-mac.e2e.ts'
      - 'tests/e2e/computer-windows.e2e.ts'
      - 'tests/e2e/helpers/computer-driver.ts'
  workflow_dispatch:
  # Axiom fork policy: no scheduled hosted-runner computer-use smoke. Keep PR
  # and manual dispatch paths for changes that touch computer-use code.

jobs:
  scheduled-gate:
    # Keep the default cron green without running full computer-use e2e on
    # generic hosted runners. Set AXIOM_FULL_COMPUTER_E2E=true when a
    # permission-bearing/self-hosted runner path is ready for scheduled runs.
    if: github.event_name == 'schedule' && vars.AXIOM_FULL_COMPUTER_E2E != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Full computer-use e2e is opt-in; skipping scheduled hosted-runner execution."

  native-smoke:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 python3-gi gir1.2-atspi-2.0 at-spi2-core xclip xdotool
      # Why: pnpm's bundled node-gyp can ship gyp_main.py without execute
      # permission on Linux runners; node-pty's install fallback then fails
      # before this smoke job can exercise the native package.
      - name: Use external node-gyp to avoid pnpm's bundled copy (Linux only)
        if: runner.os == 'Linux'
        run: |
          npm install -g node-gyp@11.5.0
          echo "npm_config_node_gyp=$(npm root -g)/node-gyp/bin/node-gyp.js" >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:computer-native
      - run: pnpm build:cli

  mac:
    # macOS Accessibility and Screen Recording require user-granted TCC entries,
    # and GitHub-hosted macOS images currently do not provide the Swift/TCC
    # environment this full e2e path needs. Keep scheduled full computer-use
    # runs opt-in so the default cron does not produce environment-only noise;
    # manual dispatch remains available for ad hoc validation.
    if: github.event_name == 'workflow_dispatch' || vars.AXIOM_FULL_COMPUTER_E2E == 'true'
    runs-on: macos-14
    env:
      ORCA_COMPUTER_E2E: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:computer-macos
      - run: pnpm verify:computer-native
      - run: pnpm build:cli
      - run: pnpm test:e2e:computer -- --reporter=verbose tests/e2e/computer-mac.e2e.ts

  linux:
    # Full computer-use e2e requires a live Orca runtime and desktop session.
    # Run it manually or from an opted-in permission-bearing runner pool instead
    # of letting the default scheduled GitHub-hosted run fail as infrastructure noise.
    if: github.event_name == 'workflow_dispatch' || vars.AXIOM_FULL_COMPUTER_E2E == 'true'
    runs-on: ubuntu-22.04
    env:
      ORCA_COMPUTER_E2E: '1'
      ACCESSIBILITY_ENABLED: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3 python3-gi gir1.2-atspi-2.0 gedit at-spi2-core xvfb xclip xdotool
      # Why: keep scheduled Linux e2e on the same native install path as PR
      # smoke and pr.yml's verify job.
      - name: Use external node-gyp to avoid pnpm's bundled copy (Linux only)
        run: |
          npm install -g node-gyp@11.5.0
          echo "npm_config_node_gyp=$(npm root -g)/node-gyp/bin/node-gyp.js" >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:computer-native
      - run: pnpm build:cli
      - run: xvfb-run --auto-servernum dbus-run-session -- pnpm test:e2e:computer -- --reporter=verbose tests/e2e/computer-linux.e2e.ts

  windows:
    # Full computer-use e2e requires a live Orca runtime and interactive desktop.
    # Keep the scheduled path opt-in until the runner starts the app/runtime reliably.
    if: github.event_name == 'workflow_dispatch' || vars.AXIOM_FULL_COMPUTER_E2E == 'true'
    runs-on: windows-latest
    env:
      ORCA_COMPUTER_E2E: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:computer-native
      - run: pnpm build:cli
      - run: pnpm test:e2e:computer -- --reporter=verbose tests/e2e/computer-windows.e2e.ts
