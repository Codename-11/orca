name: Axiom Upstream Sync Release

on:
  push:
    tags:
      - 'axiom-v*'
  repository_dispatch:
    types:
      # Intended target for a webhook bridge listening to upstream release/tag
      # events from stablyai/orca. The payload may include upstream_tag, tag,
      # ref, or axiom_tag.
      - upstream_release
      - upstream_tag
      - axiom_release
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Optional upstream Orca release tag to force, e.g. v1.4.9
        required: false
        type: string
      axiom_tag:
        description: Optional existing Axiom fork tag to build/publish, e.g. axiom-v1.4.13-axiom.2
        required: false
        type: string
      dry_run:
        description: Sync and verify without pushing tags/releases
        required: false
        default: false
        type: boolean
      build_mobile:
        description: Also run the upstream-style Android mobile APK workflow for this release
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: Rebuild and re-upload assets even if the fork release tag is already published
        required: false
        default: false
        type: boolean
      bump_axiom_revision:
        description: Publish the next Axiom revision for the selected upstream release
        required: false
        default: false
        type: boolean
      axiom_revision:
        description: Optional explicit Axiom revision number for manual fork-only releases
        required: false
        type: string
  # No timer here: upstream release/tag events should enter via repository_dispatch
  # from a webhook bridge, or via manual workflow dispatch when testing.

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: axiom-upstream-sync-release
  cancel-in-progress: false

env:
  AXIOM_DEPLOY_BRANCH: axiom/deploy
  AXIOM_UPSTREAM_BRANCH: main
  AXIOM_UPSTREAM_REPOSITORY: stablyai/orca
  AXIOM_UPSTREAM_REPOSITORY_URL: https://github.com/stablyai/orca.git
  AXIOM_INCLUDE_PRERELEASES: '0'
  ORCA_APP_ID: com.axiomlabs.orca
  ORCA_APP_USER_MODEL_ID: com.axiomlabs.orca
  ORCA_PRODUCT_NAME: Axiom Orca
  ORCA_PACKAGE_NAME: axiom-orca
  ORCA_APP_NAME: Axiom Orca
  ORCA_WINDOWS_EXECUTABLE_NAME: Axiom Orca
  ORCA_NSIS_GUID: b6c06723-a52f-5004-ad9f-f39666f5e928
  ORCA_ARTIFACT_BASENAME: axiom-orca
  # Axiom currently publishes Windows desktop builds from this fork. Mobile
  # remains on Orca's upstream-style Mobile Release workflow and only runs on
  # `mobile-v*` tags, manual dispatch, or the explicit build_mobile input below.
  ORCA_RELEASE_PLATFORMS: win
  ORCA_PUBLISH_REPOSITORY: ${{ github.repository }}
  ORCA_UPDATE_OWNER: ${{ github.repository_owner }}
  ORCA_UPDATE_REPO: ${{ github.event.repository.name }}

jobs:
  sync:
    name: Detect, sync, verify, and tag
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || vars.AXIOM_AUTO_RELEASES == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      should_release: ${{ steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate' }}
      tag: ${{ steps.check.outputs.fork_tag }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
      fork_version: ${{ steps.check.outputs.fork_version }}
      upstream_prerelease: ${{ steps.check.outputs.upstream_prerelease }}
      source: ${{ steps.check.outputs.source }}
      merge_result: ${{ steps.merge.outputs.merge_result }}
      release_notes: axiom-release-notes.md
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.axiom_tag || github.event.client_payload.axiom_tag || (github.ref_type == 'tag' && github.ref_name) || env.AXIOM_DEPLOY_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.AXIOM_MIRROR_TOKEN || secrets.AXIOM_AUTOMATION_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Enable pnpm
        run: corepack enable

      # Why: pnpm's bundled node-gyp can expose gyp_main.py without execute
      # permission on Linux, breaking native module installs such as node-pty.
      # Match pr.yml's pinned external node-gyp workaround before the release
      # job installs dependencies.
      - name: Use external node-gyp to avoid pnpm's bundled copy (Linux only)
        if: runner.os == 'Linux'
        run: |
          npm install -g node-gyp@11.5.0
          echo "npm_config_node_gyp=$(npm root -g)/node-gyp/bin/node-gyp.js" >> "$GITHUB_ENV"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AXIOM_EVENT_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          args=()
          axiom_tag="${{ inputs.axiom_tag || github.event.client_payload.axiom_tag || '' }}"
          upstream_tag="${{ inputs.upstream_tag || github.event.client_payload.upstream_tag || github.event.client_payload.tag || github.event.client_payload.ref || '' }}"
          if [[ "$upstream_tag" == refs/tags/* ]]; then
            upstream_tag="${upstream_tag#refs/tags/}"
          fi
          if [[ -z "$axiom_tag" && "$AXIOM_EVENT_TAG" == axiom-v* ]]; then
            axiom_tag="$AXIOM_EVENT_TAG"
          fi
          if [[ -n "$axiom_tag" ]]; then
            args+=(--axiom-tag "$axiom_tag")
          fi
          if [[ -n "$upstream_tag" ]]; then
            args+=(--upstream-tag "$upstream_tag")
          fi
          if [[ "${{ inputs.force_rebuild || false }}" == "true" ]]; then
            args+=(--force-rebuild)
          fi
          if [[ "${{ inputs.bump_axiom_revision || false }}" == "true" ]]; then
            args+=(--bump-axiom-revision)
          fi
          if [[ -n "${{ inputs.axiom_revision || '' }}" ]]; then
            args+=(--axiom-revision "${{ inputs.axiom_revision }}")
          fi
          node config/scripts/axiom-check-upstream-release.mjs "${args[@]}"

      - name: Stop when already published
        if: steps.check.outputs.should_release != 'true'
        run: |
          echo "No Axiom release needed: ${{ steps.check.outputs.reason }}"

      - name: Merge upstream into isolated deploy branch
        id: merge
        if: steps.check.outputs.should_release == 'true' && !inputs.force_rebuild && steps.check.outputs.source != 'axiom_tag'
        run: >-
          node config/scripts/axiom-sync-upstream-release.mjs
          --upstream-tag "${{ steps.check.outputs.upstream_tag }}"
          --fork-version "${{ steps.check.outputs.fork_version }}"
          --fork-tag "${{ steps.check.outputs.fork_tag }}"

      - name: Fast-forward upstream mirror branch
        if: steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate' && !inputs.force_rebuild && steps.check.outputs.source != 'axiom_tag' && !inputs.dry_run
        run: git push origin "+refs/remotes/upstream/${AXIOM_UPSTREAM_BRANCH}:refs/heads/${AXIOM_UPSTREAM_BRANCH}"

      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate'
        run: pnpm install --frozen-lockfile

      - name: Verify Axiom release version
        if: steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate'
        run: node config/scripts/verify-axiom-release-version.mjs "${{ steps.check.outputs.fork_version }}" "${{ steps.check.outputs.fork_tag }}"

      - name: Verify combined fork
        if: steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate'
        run: |
          pnpm run typecheck
          # Tests assert both upstream defaults and fork-specific env overrides.
          # Release jobs export fork env globally, so run Vitest with those values unset.
          env \
            -u GITHUB_REPOSITORY \
            -u ORCA_APP_ID \
            -u ORCA_APP_USER_MODEL_ID \
            -u ORCA_PRODUCT_NAME \
            -u ORCA_PACKAGE_NAME \
            -u ORCA_APP_NAME \
            -u ORCA_WINDOWS_EXECUTABLE_NAME \
            -u ORCA_NSIS_GUID \
            -u ORCA_ARTIFACT_BASENAME \
            -u ORCA_PUBLISH_REPOSITORY \
            -u ORCA_UPDATE_OWNER \
            -u ORCA_UPDATE_REPO \
            pnpm exec vitest run --config config/vitest.config.ts \
            src/shared/task-providers.test.ts \
            src/main/axiom-release-hardening.test.ts \
            src/main/updater-endpoints.test.ts \
            src/main/updater-prerelease-feed.test.ts \
            src/main/updater-nudge.test.ts \
            src/main/updater-changelog.test.ts \
            src/main/app-build-identity.test.ts \
            config/scripts/axiom-upstream-sync-release.test.mjs \
            config/scripts/generate-mobile-update-manifest.test.mjs

      - name: Generate release notes
        if: steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AXIOM_FORK_TAG: ${{ steps.check.outputs.fork_tag }}
          AXIOM_FORK_VERSION: ${{ steps.check.outputs.fork_version }}
        run: node config/scripts/axiom-generate-release-notes.mjs "${{ steps.check.outputs.upstream_tag }}" --output axiom-release-notes.md

      - name: Create release tag
        if: steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate' && steps.check.outputs.source != 'axiom_tag' && !inputs.dry_run
        run: |
          tag="${{ steps.check.outputs.fork_tag }}"
          git tag -f "$tag"
          git push origin "HEAD:${AXIOM_DEPLOY_BRANCH}"
          git push origin "refs/tags/$tag" --force

      - name: Create draft release shell
        if: steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate' && !inputs.dry_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.check.outputs.fork_tag }}"
          title="Axiom Orca ${{ steps.check.outputs.fork_version }} (upstream ${{ steps.check.outputs.upstream_tag }})"
          release_flags=()
          # Why: every Axiom fork version contains an `-axiom.N` suffix, but
          # stable upstream releases must still be GitHub "latest" candidates.
          # Only mirror upstream prerelease status, not the fork suffix.
          if [[ "${{ steps.check.outputs.upstream_prerelease }}" == "true" ]]; then
            release_flags+=(--prerelease)
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file axiom-release-notes.md \
              "${release_flags[@]}"
          else
            # The previous step has already pushed the release tag. Let GitHub
            # attach the draft to that tag; passing the tag itself as
            # target_commitish is invalid for `gh release create`.
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file axiom-release-notes.md \
              --draft \
              "${release_flags[@]}"
          fi

      - name: Upload release notes artifact
        if: steps.check.outputs.should_release == 'true' && steps.merge.outputs.merge_result != 'agent_remediate'
        uses: actions/upload-artifact@v4
        with:
          name: axiom-release-notes
          path: axiom-release-notes.md

      - name: Notify upstream sync failure
        if: failure() && steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.AXIOM_AUTOMATION_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.AXIOM_AUTOMATION_TOKEN || github.token }}
          AXIOM_SYNC_DISCORD_WEBHOOK: ${{ secrets.AXIOM_SYNC_DISCORD_WEBHOOK }}
          AXIOM_SYNC_FORGE_WEBHOOK: ${{ secrets.AXIOM_SYNC_FORGE_WEBHOOK }}
          AXIOM_SYNC_FAILURE_SEVERITY: noncritical
          AXIOM_UPSTREAM_TAG: ${{ steps.check.outputs.upstream_tag }}
          AXIOM_FORK_TAG: ${{ steps.check.outputs.fork_tag }}
          AXIOM_FORK_VERSION: ${{ steps.check.outputs.fork_version }}
          AXIOM_FAILED_STEP: Detect, sync, verify, and tag
        run: node config/scripts/axiom-report-sync-failure.mjs

      - name: Request Hermes merge remediation
        if: steps.merge.outputs.merge_result == 'agent_remediate'
        env:
          GH_TOKEN: ${{ secrets.AXIOM_AUTOMATION_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.AXIOM_AUTOMATION_TOKEN || github.token }}
          AXIOM_SYNC_REMEDIATION_WEBHOOK: ${{ secrets.AXIOM_SYNC_REMEDIATION_WEBHOOK }}
          AXIOM_SYNC_REMEDIATION_TOKEN: ${{ secrets.AXIOM_SYNC_REMEDIATION_TOKEN }}
          AXIOM_REMEDIATION_MODE: agent_pr
          AXIOM_UPSTREAM_TAG: ${{ steps.check.outputs.upstream_tag }}
          AXIOM_FORK_TAG: ${{ steps.check.outputs.fork_tag }}
          AXIOM_FORK_VERSION: ${{ steps.check.outputs.fork_version }}
          AXIOM_FAILED_STEP: Detect, sync, verify, and tag
        run: node config/scripts/axiom-request-merge-remediation.mjs

  build:
    name: Build and publish Windows desktop
    needs: sync
    if: needs.sync.outputs.should_release == 'true' && !inputs.dry_run
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          ORCA_SKIP_ELECTRON_BUILDER_REBUILD: '1'
        shell: bash
        run: pnpm run build:release && pnpm exec electron-builder --config config/electron-builder.config.cjs --win --publish never

      - name: Upload Windows installer to Axiom GitHub Releases feed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.sync.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            dist/axiom-orca-windows-setup.exe \
            dist/axiom-orca-windows-setup.exe.blockmap \
            dist/latest.yml \
            --clobber

  mobile:
    name: Build Android mobile APK for stable/Axiom releases
    needs: sync
    if: needs.sync.outputs.should_release == 'true' && !inputs.dry_run && (needs.sync.outputs.upstream_prerelease != 'true' || inputs.build_mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Build Android release APK
        shell: bash
        run: |
          cd android
          for attempt in 1 2 3; do
            if ./gradlew assembleRelease --refresh-dependencies; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              exit 1
            fi
            echo "Gradle assembleRelease failed; retrying in 20s (attempt $attempt/3)..."
            sleep 20
          done

      - name: Generate mobile update manifest
        shell: bash
        run: |
          apk_path="$(find android/app/build/outputs/apk/release -name '*.apk' -print -quit)"
          if [[ -z "$apk_path" ]]; then
            echo "No release APK found for mobile update manifest" >&2
            exit 1
          fi
          source_sha="$(git rev-parse HEAD)"
          node ../config/scripts/generate-mobile-update-manifest.mjs \
            --release-tag "${{ needs.sync.outputs.tag }}" \
            --release-version "${{ needs.sync.outputs.fork_version }}" \
            --repository "$GITHUB_REPOSITORY" \
            --source-sha "$source_sha" \
            --apk "$apk_path" \
            --output mobile-update.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiom-orca-mobile-apk
          path: |
            mobile/android/app/build/outputs/apk/release/*.apk
            mobile/mobile-update.json

      - name: Upload APKs and mobile update manifest to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ needs.sync.outputs.tag }}" --repo "$GITHUB_REPOSITORY" android/app/build/outputs/apk/release/*.apk mobile-update.json --clobber

  publish:
    name: Verify assets and publish release
    needs: [sync, build, mobile]
    if: always() && needs.sync.outputs.should_release == 'true' && !inputs.dry_run && needs.build.result == 'success' && (needs.mobile.result == 'success' || needs.mobile.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Verify required release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ORCA_RELEASE_PLATFORMS: ${{ (needs.mobile.result == 'success' || inputs.build_mobile) && 'win,android' || env.ORCA_RELEASE_PLATFORMS }}
        run: node config/scripts/verify-release-required-assets.mjs "${{ needs.sync.outputs.tag }}"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_flags=(--draft=false)
          # Why: Axiom stable builds include `-axiom.N`; only upstream RC/beta
          # tags should be published as GitHub prereleases.
          if [[ "${{ needs.sync.outputs.upstream_prerelease }}" == "true" ]]; then
            publish_flags+=(--prerelease)
          else
            publish_flags+=(--prerelease=false --latest)
          fi
          gh release edit "${{ needs.sync.outputs.tag }}" --repo "$GITHUB_REPOSITORY" "${publish_flags[@]}"

  notify-release:
    name: Notify stable Axiom release
    needs: [sync, publish]
    if: >-
      always() &&
      needs.sync.outputs.should_release == 'true' &&
      needs.sync.outputs.upstream_prerelease != 'true' &&
      !inputs.dry_run &&
      needs.publish.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ env.AXIOM_DEPLOY_BRANCH }}
          fetch-depth: 1

      - name: Post Discord release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AXIOM_RELEASE_DISCORD_WEBHOOK: ${{ secrets.AXIOM_RELEASE_DISCORD_WEBHOOK }}
          AXIOM_SYNC_DISCORD_WEBHOOK: ${{ secrets.AXIOM_SYNC_DISCORD_WEBHOOK }}
          AXIOM_UPSTREAM_TAG: ${{ needs.sync.outputs.upstream_tag }}
          AXIOM_FORK_TAG: ${{ needs.sync.outputs.tag }}
          AXIOM_FORK_VERSION: ${{ needs.sync.outputs.fork_version }}
        run: node config/scripts/axiom-post-release-discord-notes.mjs

  notify-failure:
    name: Notify failed Axiom release
    needs: [sync, build, mobile, publish, notify-release]
    if: >-
      always() &&
      needs.sync.outputs.should_release == 'true' &&
      !inputs.dry_run &&
      (needs.sync.result == 'failure' || needs.build.result == 'failure' || needs.mobile.result == 'failure' || needs.publish.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Axiom deploy branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.AXIOM_DEPLOY_BRANCH }}
          fetch-depth: 0

      - name: Notify release failure
        env:
          GH_TOKEN: ${{ secrets.AXIOM_AUTOMATION_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.AXIOM_AUTOMATION_TOKEN || github.token }}
          AXIOM_SYNC_DISCORD_WEBHOOK: ${{ secrets.AXIOM_SYNC_DISCORD_WEBHOOK }}
          AXIOM_SYNC_FORGE_WEBHOOK: ${{ secrets.AXIOM_SYNC_FORGE_WEBHOOK }}
          AXIOM_SYNC_FAILURE_SEVERITY: critical
          AXIOM_UPSTREAM_TAG: ${{ needs.sync.outputs.upstream_tag }}
          AXIOM_FORK_TAG: ${{ needs.sync.outputs.tag }}
          AXIOM_FORK_VERSION: ${{ needs.sync.outputs.fork_version }}
          AXIOM_FAILED_STEP: Axiom release build/publish
        run: node config/scripts/axiom-report-sync-failure.mjs
